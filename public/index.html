<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HybridSecure</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">HS</div>
      <h1 class="login-title">HybridSecure</h1>
      <p class="login-sub">Secure real-time chat with live cryptography</p>
      <a href="/auth/google/redirect" class="signin-btn">Sign in with Google</a>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-me">
          <img id="myPic" class="avatar">
          <span id="myName" class="sidebar-me-name"></span>
        </div>
        <input id="searchInput" class="search-input" placeholder="Search">
      </div>
      <div id="userList" class="user-list"></div>
      <button id="logoutBtn" class="logout-btn">Sign out</button>
    </div>

    <!-- CHAT -->
    <div class="chat-panel">
      <div class="chat-header">
        <button class="back-btn" aria-label="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <img id="chatPic" class="avatar avatar-sm">
        <span id="chatName" class="chat-name"></span>
        <button id="toggleLabBtn" class="toggle-lab-btn">Crypto Lab</button>
      </div>

      <div id="messages" class="messages"></div>

      <div class="composer">
        <input id="messageInput" class="composer-input" placeholder="Message" type="text" autocomplete="off">
        <button id="sendBtn" class="send-btn">Send</button>
      </div>
    </div>

    <!-- CRYPTO LAB -->
    <div id="cryptoLab" class="crypto-lab">
      <div class="lab-header">
        <span class="lab-title">Crypto Lab</span>
        <button id="closeLabBtn" class="close-lab-btn" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="lab-body">
        <div id="labPlaceholder" class="lab-placeholder">
          <div class="lab-placeholder-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <p>Send a message to see the encryption pipeline</p>
        </div>
        <div id="labSteps" class="lab-steps hidden"></div>
        <div id="labNetwork" class="lab-section hidden">
          <div class="lab-section-title">Network view</div>
          <div class="lab-network-grid">
            <div>
              <div class="lab-network-label lab-wire-label">On the wire</div>
              <pre id="wireData" class="lab-pre lab-pre-wire"></pre>
            </div>
            <div>
              <div class="lab-network-label lab-plain-label">Plaintext</div>
              <pre id="plainData" class="lab-pre lab-pre-plain"></pre>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /app -->

  <!-- MOBILE NAV -->
  <nav id="mobileNav" class="mobile-nav hidden">
    <button class="mobile-nav-btn active" data-panel="chat">Chat</button>
    <button class="mobile-nav-btn" data-panel="lab">Crypto Lab</button>
  </nav>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
